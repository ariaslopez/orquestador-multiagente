# ============================================
# CLAW Agent System — Configuracion Global
# ============================================

app:
  name: "CLAW Agent System"
  version: "2.0.0"
  description: "Orquestador autonomo multi-agente con 12 pipelines especializados"

# --------------------------------------------
# PERFILES DE AMBIENTE
# --------------------------------------------
environments:
  local:
    description: "PC local / desarrollo"
    max_concurrent_tasks: 1
    memory_backend: sqlite
    log_level: INFO
    ui_enabled: true
    hyperspace_enabled: false
    groq_model: llama-3.3-70b-versatile
    gemini_model: gemini-2.0-flash

  server:
    description: "Servidor cloud / Windows Server / produccion"
    max_concurrent_tasks: 3
    memory_backend: supabase
    log_level: WARNING
    ui_enabled: true
    hyperspace_enabled: false
    groq_model: llama-3.3-70b-versatile
    gemini_model: gemini-2.0-flash

# --------------------------------------------
# PIPELINES DISPONIBLES
# --------------------------------------------
pipelines:
  dev:
    name: "Dev Assistant"
    description: "Genera proyectos de software completos"
    agents: [planner, coder, reviewer, security, executor, git]
    mode: sequential
    max_retries: 3
    enabled: true

  research:
    name: "Research Engine"
    description: "Tesis de inversion con datos web + locales"
    agents: [web_scout, data, analyst, thesis]
    mode: parallel_then_sequential
    parallel_agents: [web_scout, data]
    sequential_agents: [analyst, thesis]
    enabled: true

  content:
    name: "Content Generator"
    description: "Contenido crypto con pipeline editorial completo"
    agents: [topic, writer, editor, brand, scheduler]
    mode: sequential
    enabled: true

  office:
    name: "Office Pipeline"
    description: "Analiza Excel, Word, PDF, PowerPoint con reporte ejecutivo"
    agents: [file_reader, data_analyzer, report_writer]
    mode: sequential
    enabled: true

  qa:
    name: "QA Pipeline"
    description: "Auditoria completa: estatica, bugs, seguridad, performance y tests"
    agents: [static_analyzer, bug_hunter, security_reviewer, performance_profiler, test_generator]
    mode: sequential
    enabled: true

  pm:
    name: "PM Pipeline"
    description: "Convierte descripciones en backlog, sprints y roadmap completo"
    agents: [requirements_parser, backlog_builder, sprint_planner, roadmap_generator]
    mode: sequential
    enabled: true

  trading:
    name: "Trading Analytics"
    description: "Analiza bots y estrategias: metricas, riesgo y recomendaciones"
    agents: [backtest_reader, metrics_calculator, risk_analyzer, strategy_advisor]
    mode: sequential
    enabled: true

  # --- Fase 9 ---

  analytics:
    name: "Analytics Pipeline"
    description: "Consolida datos, extrae insights de negocio y genera reporte ejecutivo"
    agents: [data_collector, insight_generator, report_distributor]
    mode: sequential
    enabled: true

  marketing:
    name: "Marketing Pipeline"
    description: "Estrategia de marketing, copy, growth loops y metricas CAC/LTV"
    agents: [strategy_agent, copy_agent, growth_agent, analytics_agent]
    mode: sequential
    enabled: true

  product:
    name: "Product Pipeline"
    description: "Investigacion de mercado, feedback, priorizacion RICE y nudges"
    agents: [market_researcher, feedback_synthesizer, feature_prioritizer, nudge_designer]
    mode: sequential
    enabled: true

  security_audit:
    name: "Security Audit Pipeline"
    description: "Modelado de amenazas STRIDE, code review OWASP y compliance GDPR/CCPA"
    agents: [threat_modeler, code_reviewer, compliance_checker]
    mode: sequential
    enabled: true

  design:
    name: "Design Pipeline"
    description: "Sistema de diseno UI, arquitectura UX, branding, a11y y prompts de imagen"
    agents: [ui_agent, ux_agent, brand_agent, a11y_agent, prompt_engineer]
    mode: sequential
    enabled: true

# --------------------------------------------
# ROUTER DE APIs LLM
# Prioridad: groq > gemini > hyperspace
# --------------------------------------------
api_router:
  strategy: smart  # smart | groq_only | gemini_only | local_only
  rules:
    - task_type: reasoning
      api: groq
      model: llama-3.3-70b-versatile
    - task_type: fast
      api: gemini
      model: gemini-2.0-flash
    - task_type: embeddings
      api: hyperspace
      model: all-MiniLM-L6-v2
    - task_type: fallback
      api: gemini
      model: gemini-2.0-flash

# --------------------------------------------
# SEGURIDAD
# --------------------------------------------
security:
  protected_paths:
    - "C:/Windows"
    - "C:/System32"
    - "/etc"
    - "/sys"
    - "/boot"
    - "/root"
  allowed_commands:
    - "pip install"
    - "npm install"
    - "python"
    - "node"
    - "cargo build"
    - "go build"
    - "pytest"
    - "git"
  blocked_patterns:
    - "rm -rf"
    - "format"
    - "del /f"
    - "DROP TABLE"
    - "DROP DATABASE"
  max_file_size_mb: 50
  scan_for_secrets: true

# --------------------------------------------
# MEMORIA
# --------------------------------------------
memory:
  local_db: ./data/claw_memory.db
  sync_to_supabase: true
  sync_interval_minutes: 5
  max_history_entries: 1000
  checkpoint_enabled: true

# --------------------------------------------
# UI DASHBOARD
# --------------------------------------------
ui:
  theme: dark
  refresh_interval_ms: 500
  max_log_lines: 500
  show_token_usage: true
  show_cost_estimate: true
  modules_view: true
  detailed_logs: true
