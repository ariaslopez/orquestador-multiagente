name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Instalar solo dependencias core + testing (excluye offline/legacy pesados)
          pip install \
            aiohttp httpx \
            groq openai \
            fastapi uvicorn websockets jinja2 python-multipart \
            sqlalchemy aiosqlite \
            duckduckgo-search beautifulsoup4 requests lxml \
            pycoingecko \
            openpyxl python-docx pdfplumber python-pptx pandas \
            PyGithub GitPython \
            cryptography \
            rich click questionary \
            python-dotenv pyyaml loguru tenacity psutil \
            pytest pytest-asyncio

      - name: Run tests
        env:
          OPENAI_API_KEY: "test-key-not-real"
          GROQ_API_KEY: "test-key-not-real"
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_KEY: "test-key-not-real"
        run: |
          python -m pytest tests/ -v --tb=short --timeout=30 2>&1 | head -200

      - name: Check import health (smoke test)
        run: |
          python -c "from core.maestro import Maestro; print('Maestro OK')"
          python -c "from core.pipeline_router import PipelineRouter; print('PipelineRouter OK')"
