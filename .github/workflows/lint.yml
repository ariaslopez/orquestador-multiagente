# ============================================================
# CLAW Agent System — CI: Ruff lint
# Fase 14 — Corre en cada push y PR a main
# ============================================================
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    name: Ruff lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Run ruff (check only — no autofix)
        run: ruff check . --output-format=github

      - name: Run ruff format check
        run: ruff format --check .
